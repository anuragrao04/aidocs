version: 2

project_name: aidocs

before:
  hooks:
    - go mod tidy
    # Generate shell completions from the live command tree so they always
    # match the shipped binary.
    - sh -c 'mkdir -p completions && for sh in bash zsh fish; do go run ./cli completion "$sh" > "completions/aidocs.$sh"; done'

builds:
  - id: aidocs
    main: ./cli
    binary: aidocs
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: aidocs
    ids:
      - aidocs
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE
      - README.md
      - cli/README.md
      - completions/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

brews:
  - name: aidocs
    homepage: https://github.com/anuragrao04/aidocs
    description: Give your agents the power to publish reviewable HTML documents
    license: Apache-2.0
    repository:
      owner: anuragrao04
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    install: |
      bin.install "aidocs"
      bash_completion.install "completions/aidocs.bash" => "aidocs"
      zsh_completion.install "completions/aidocs.zsh" => "_aidocs"
      fish_completion.install "completions/aidocs.fish"
    test: |
      system "#{bin}/aidocs", "--help"

{{- if or (not .Values.googleOAuth.existingSecret) (not .Values.session.existingSecret) (not .Values.database.existingSecret) (and (not .Values.blob.existingSecret) (or .Values.blob.accessKeyID .Values.blob.secretAccessKey)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aidocs.secretName" . }}
  labels:
    {{- include "aidocs.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.googleOAuth.existingSecret }}
  {{ .Values.googleOAuth.clientIDKey }}: {{ required "googleOAuth.clientID is required unless googleOAuth.existingSecret is set" .Values.googleOAuth.clientID | quote }}
  {{ .Values.googleOAuth.clientSecretKey }}: {{ required "googleOAuth.clientSecret is required unless googleOAuth.existingSecret is set" .Values.googleOAuth.clientSecret | quote }}
  {{- end }}
  {{- if not .Values.session.existingSecret }}
  {{ .Values.session.secretKey }}: {{ required "session.secret is required unless session.existingSecret is set" .Values.session.secret | quote }}
  {{- end }}
  {{- if not .Values.database.existingSecret }}
  {{ .Values.database.urlKey }}: {{ required "database.url is required unless database.existingSecret is set" .Values.database.url | quote }}
  {{- end }}
  {{- if and (not .Values.blob.existingSecret) (or .Values.blob.accessKeyID .Values.blob.secretAccessKey) }}
  {{ .Values.blob.accessKeyIDKey }}: {{ .Values.blob.accessKeyID | quote }}
  {{ .Values.blob.secretAccessKeyKey }}: {{ .Values.blob.secretAccessKey | quote }}
  {{- end }}
{{- end }}

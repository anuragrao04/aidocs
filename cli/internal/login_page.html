<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>aidocs — {{.Title}}</title>
<style>
  :root {
    --bg: #fafafa; --surface: #ffffff; --border: #e4e4e7;
    --fg: #18181b; --fg-muted: #71717a; --accent: #2028ff;
    --success: #16a34a; --danger: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #09090b; --surface: #111113; --border: #27272a;
      --fg: #fafafa; --fg-muted: #a1a1aa; --accent: #818cff;
      --success: #4ade80; --danger: #f87171;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: "Inter", ui-sans-serif, system-ui, -apple-system,
      BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    width: 100%; max-width: 380px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 32px;
    text-align: center;
    box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
  }
  .icon {
    width: 48px; height: 48px; margin: 0 auto 20px;
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon svg { width: 26px; height: 26px; }
  /* Tone is selected by the body class so no colors/markup are injected. */
  body.ok .icon { background: color-mix(in srgb, var(--success) 14%, transparent); color: var(--success); }
  body.err .icon { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
  body.ok .icon-err, body.err .icon-ok { display: none; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; letter-spacing: -.01em; }
  p { font-size: 14px; line-height: 1.5; color: var(--fg-muted); margin: 0; }
</style>
</head>
<body class="{{.Class}}">
  <div class="card">
    <div class="icon">
      <svg class="icon-ok" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5" /></svg>
      <svg class="icon-err" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18" /><path d="m6 6 12 12" /></svg>
    </div>
    <h1>{{.Title}}</h1>
    <p>{{.Detail}}</p>
  </div>
</body>
</html>
